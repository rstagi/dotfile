# Starship prompt configuration
# https://starship.rs/config/

# Timeout for commands executed by starship (ms)
command_timeout = 1000

# Newline between prompt lines
add_newline = true

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold yellow"

[python]
symbol = " "
style = "bold blue"

[nodejs]
symbol = " "
style = "bold green"

[terraform]
symbol = "💠 "
style = "bold 105"

[gcloud]
format = "on [$symbol($project)]($style) "
symbol = "☁️ "
style = "bold blue"

[kubernetes]
disabled = false
symbol = "⎈ "
style = "bold blue"

[docker_context]
symbol = " "
style = "bold blue"
